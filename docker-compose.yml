services:
  db:
    image: postgres:15-alpine
    container_name: liderweb_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: liderweb
      POSTGRES_USER: liderweb_user
      POSTGRES_PASSWORD: liderweb_pass
    ports:
      - "5432:5432"
    volumes:
      - liderweb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liderweb_user -d liderweb"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: liderweb_app
    user: root
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://liderweb_user:liderweb_pass@db:5432/liderweb?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      # Troque por algo forte depois (por enquanto é só LAB)
      NEXTAUTH_SECRET: "dev-secret-change-me"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      # Serviço interno de análise automática (container audio_analysis)
      AUDIO_ANALYSIS_SERVICE_URL: "http://audio_analysis:8001"
      # Token opcional para autenticar envio de jobs ao serviço de análise
      AUDIO_ANALYSIS_SERVICE_TOKEN: "dev-audio-service-token"
      # Token compartilhado para callback do worker -> app (/api/songs/:id/analysis-result)
      AUDIO_ANALYSIS_CALLBACK_TOKEN: "dev-audio-callback-token"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      LALAL_API_KEY: ${LALAL_API_KEY}
    volumes:
      - ./:/app
      - liderweb_node_modules:/app/node_modules
    command: sh -lc "npm install --legacy-peer-deps --no-audit --no-fund && npx prisma generate && npx prisma db push --accept-data-loss && npm run dev"
    depends_on:
      db:
        condition: service_healthy

  audio_analysis:
    build:
      context: .
      dockerfile: workers/Dockerfile
    container_name: liderweb_audio_analysis
    restart: unless-stopped
    environment:
      # URL pública/interna da app Next para callback do resultado
      APP_BASE_URL: "http://app:3000"
      # Deve ser igual ao AUDIO_ANALYSIS_CALLBACK_TOKEN da app
      AUDIO_ANALYSIS_CALLBACK_TOKEN: "dev-audio-callback-token"
      # Deve ser igual ao AUDIO_ANALYSIS_SERVICE_TOKEN da app
      AUDIO_ANALYSIS_SERVICE_TOKEN: "dev-audio-service-token"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  liderweb_pgdata:
  liderweb_node_modules:

name: Deploy para Produção

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/liderweb

            echo "📦 Atualizando código..."
            git pull origin main

            echo "🔨 Fazendo build do app..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod build app

            echo "🔄 Reiniciando containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            echo "📋 Rodando migrations..."
            docker cp /opt/liderweb/prisma liderweb_app:/app/prisma
            docker exec liderweb_app sh -c "DATABASE_URL=$(grep DATABASE_URL /opt/liderweb/.env.prod | cut -d\"'\" -f2) npx prisma@6 db push --schema /app/prisma/schema.prisma --skip-generate --accept-data-loss"

            echo "🧹 Limpando cache do Docker..."
            docker builder prune -f --keep-storage 2gb

            echo "✅ Deploy concluído!"

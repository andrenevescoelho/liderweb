name: Deploy para Produção

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy na VPS
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Sincronizar código (preservando arquivos de prod)
        run: |
          rsync -av --delete \
            --exclude='.env.prod' \
            --exclude='docker-compose.prod.yml' \
            --exclude='nginx/' \
            --exclude='.git/' \
            $GITHUB_WORKSPACE/ /opt/liderweb/

      - name: Build e deploy
        run: |
          set -e
          cd /opt/liderweb
          docker compose -f docker-compose.prod.yml --env-file .env.prod build app
          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
          docker cp /opt/liderweb/prisma liderweb_app:/app/prisma
          docker exec liderweb_app npx prisma db push --accept-data-loss --schema=/app/prisma/schema.prisma
          docker builder prune -f --keep-storage 2gb
          echo "✅ Deploy concluído!"
